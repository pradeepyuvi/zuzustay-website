<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="ZUZUStay - Smart PG & Rental Property Management. Manage properties, rooms, tenants, rent collection, expenses and operations from one platform.">
  <meta name="theme-color" content="#0d1b2a">

  <title>ZUZUStay | Smart PG & Rental Property Management</title>

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=3">
  <link rel="apple-touch-icon" href="/assets/images/logo.png?v=3">

  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

  <!-- Preloader Screen -->
  <div id="preloader" class="preloader">
    <div class="preloader-content">
      <div class="preloader-logo-wrapper">
        <img src="/assets/images/logo.png" alt="ZUZUStay Logo" class="preloader-logo">
        <div class="preloader-spinner"></div>
      </div>
      <div class="preloader-text">ZUZUStay</div>
    </div>
  </div>

  <!-- Fullscreen Background Overlay -->
  <div class="bg-wrapper"></div>

  <!-- Page Layout Wrapper -->
  <div class="page-container">

    <!-- Top Center Logo & Title -->
    <header class="logo-container">
      <img src="/assets/images/logo.png" alt="ZUZUStay Logo" class="logo-icon">
      <div class="logo-text">ZUZUStay</div>
    </header>

    <!-- Left-Middle Content Box -->
    <main class="main-content">
      <div class="content-card">
        <span class="badge">Coming Soon</span>
        <h1 class="heading">Smart PG & Rental <span>Property Management</span></h1>
        <p class="description">
          Manage properties, rooms, tenants, rent collection, expenses and operations from one platform.
        </p>
      </div>
    </main>

    <!-- Footer Area -->
    <footer>
      <div class="footer-bottom-info">
        &copy; 2026 ZUZUStay. All rights reserved.
      </div>
      <div class="footer-links">
        <a href="/privacy-policy.html">Privacy Policy</a>
        <a href="/terms-of-service.html">Terms of Service</a>
        <a href="mailto:admin@zuzustay.com" class="contact-email">admin@zuzustay.com</a>
      </div>
    </footer>

  </div>

  <!-- JS Logic -->
  <script src="/assets/js/main.js"></script>

</html>
